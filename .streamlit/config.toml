# ============================================================================
# Streamlit Configuration for NBDScanner
# Optimized for Large Genomic Sequence Analysis
# ============================================================================

[server]
# Maximum file upload size in MB (increased from default 200MB to 1000MB / 1GB)
# This allows users to upload large FASTA files containing full chromosomes
# or multiple genomic regions without hitting size limits
maxUploadSize = 1000

# Maximum WebSocket message size in MB (increased to match maxUploadSize)
# This prevents WebSocket connection errors when transferring large data
# between client and server during file upload and analysis
maxMessageSize = 1000

# Enable XSRF protection for security
enableXsrfProtection = true

# Enable CORS for local development (set to false in production)
enableCORS = false

# Increase file watcher timeout for large file processing
fileWatcherType = "auto"

[browser]
# Prevent browser from opening automatically (useful for server deployments)
gatherUsageStats = false

[runner]
# Increase the magic number that controls when Streamlit will
# wait for user input before running the script
# This helps with large file processing
magicEnabled = true

# Fast reruns for better performance
fastReruns = true

[client]
# Increase timeout for client connections (useful for large file uploads)
# Set to 60 seconds to allow time for large file transfers
showErrorDetails = true
toolbarMode = "auto"

[theme]
# Use default theme - customization is done via CSS in app.py
base = "light"
